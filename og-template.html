<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #60a5fa 100%);
    font-family: system-ui, -apple-system, sans-serif;
    color: white;
  }
  .container {
    text-align: center;
    padding: 60px;
  }
  h1 {
    font-size: 72px;
    font-weight: 800;
    margin-bottom: 20px;
    letter-spacing: -2px;
  }
  p {
    font-size: 32px;
    opacity: 0.9;
    margin-bottom: 40px;
  }
  .pills {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .pill {
    padding: 10px 24px;
    background: rgba(255,255,255,0.2);
    border-radius: 50px;
    font-size: 20px;
    font-weight: 500;
  }
  .domain {
    margin-top: 40px;
    font-size: 24px;
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Pick Your Shop</h1>
    <p>Every creator shop. One place.</p>
    <div class="pills">
      <span class="pill">TikTok</span>
      <span class="pill">Amazon</span>
      <span class="pill">Instagram</span>
      <span class="pill">YouTube</span>
      <span class="pill">Pinterest</span>
    </div>
    <div class="domain">pickyour.shop</div>
  </div>
</body>
</html>
