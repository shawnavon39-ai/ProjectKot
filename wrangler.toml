# Cloudflare Workers / Pages config.
#
# The [vars] section makes environment variables available to miniflare
# during the Astro prerender step (build-time static page generation).
# Without this, getStaticPaths() can't reach Supabase during the build.
#
# PUBLIC_ vars are safe to commit — the anon key is designed to be public
# (Row Level Security in Supabase handles actual access control).
# Secrets (service role key, admin password) stay in the Cloudflare
# dashboard and are only available at runtime, not build time.

[vars]
